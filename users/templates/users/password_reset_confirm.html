{% extends 'mailing/base.html' %}

{% block title %}Установка нового пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Установка нового пароля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                     {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Установить пароль</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
